<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>DHT11 Dashboard | ESP32</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="dashboard-container">
    <header class="dashboard-header">
      <h1>DHT11 Sensor Monitor</h1>
      <p class="subtitle">Monitoring suhu dan kelembaban dari ESP32</p>

      <div class="header-row">
        <div class="connection-status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Menghubungkan...</span>
        </div>
        <div class="realtime-info">
          <span class="realtime-label">Waktu Lokal</span>
          <span class="realtime-clock" id="realtimeClock">--:--:--</span>
        </div>
      </div>
    </header>

    <main class="cards-grid">
      <section class="sensor-card temperature-card">
        <h2>Suhu Ruangan</h2>
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 240 150" role="img" aria-label="Gauge suhu">
            <path class="gauge-track" d="M20 130 A100 100 0 0 1 220 130" pathLength="100"></path>
            <path class="gauge-progress" id="tempArc" d="M20 130 A100 100 0 0 1 220 130" pathLength="100"></path>
          </svg>
          <div class="needle" id="tempNeedle"></div>
          <div class="gauge-center-dot"></div>
          <div class="gauge-label gauge-min">0</div>
          <div class="gauge-label gauge-mid">25</div>
          <div class="gauge-label gauge-max">50</div>
        </div>
        <div class="sensor-value"><span id="temperatureValue">--</span><small>deg C</small></div>
      </section>

      <section class="sensor-card humidity-card">
        <h2>Kelembaban</h2>
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 240 150" role="img" aria-label="Gauge kelembaban">
            <path class="gauge-track" d="M20 130 A100 100 0 0 1 220 130" pathLength="100"></path>
            <path class="gauge-progress" id="humArc" d="M20 130 A100 100 0 0 1 220 130" pathLength="100"></path>
          </svg>
          <div class="needle" id="humNeedle"></div>
          <div class="gauge-center-dot"></div>
          <div class="gauge-label gauge-min">0</div>
          <div class="gauge-label gauge-mid">50</div>
          <div class="gauge-label gauge-max">100</div>
        </div>
        <div class="sensor-value"><span id="humidityValue">--</span><small>% RH</small></div>
      </section>
    </main>

    <footer class="dashboard-footer">
      <div class="sensor-update">
        Data terakhir dari sensor: <span id="sensorLastUpdate">--:--:--</span>
      </div>
      <button class="refresh-btn" id="refreshBtn">Refresh Sekarang</button>
      <div class="auto-refresh-info">Auto refresh setiap 3 detik</div>
    </footer>
  </div>
</body>
</html>
